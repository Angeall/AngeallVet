services:
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Tenant-local authentication provider (DEFAULT tenant).
  # Each additional tenant runs its own PocketBase instance; register it in the
  # central `tenants` table (pocketbase_url + superuser credentials).
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    # Use the image's default entrypoint (serves with --dir=/pb_data) and let it
    # auto-create the superuser the backend uses to manage users. Do NOT set a
    # custom `command:` without --dir=/pb_data, or data won't persist to the volume.
    environment:
      - PB_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8090:8090"   # dev convenience + admin UI (http://localhost:8090/_/)
    volumes:
      - pb_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"   # dev convenience (Swagger at /api/docs)
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    env_file:
      - .env
    environment:
      # Backend reaches PocketBase over the internal Docker network.
      - POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      db:
        condition: service_healthy
      pocketbase:
        condition: service_started

  frontend:
    build: ./frontend
    expose:
      - "3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      # Behind Caddy everything is same-origin: API at /api/v1, PocketBase at /pb.
      - VITE_API_URL=/api/v1
      - VITE_POCKETBASE_URL=
    depends_on:
      - backend

  # Reverse proxy: drives sub-domain tenant resolution.
  #   <tenant>.angeallvet.localhost        -> frontend
  #   <tenant>.angeallvet.localhost/api    -> backend (Host carries the tenant)
  #   <tenant>.angeallvet.localhost/pb     -> that tenant's PocketBase
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - pocketbase

volumes:
  pgdata:
  uploads:
  pb_data:
  caddy_data:
  caddy_config:
